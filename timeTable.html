<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Table</title>
    <link href = "style.css" rel = "stylesheet">
</head>
<body  style="background-color: rgb(211, 235, 238);">

<h3>Schedule</h3>

<table border="1" cellpadding="20" cellspacing="0">

<tr>
    <th class="number"></th>
    <th class="number">1</th>
    <th class="number">2</th>
    <th class="number">3</th>
    <th class="number"></th>
    <th colspan="2" class="number">4</th>
    <th colspan="2" class="number">6</th>
</tr>

<tr>
    <td class="days">Mon</td>
    <td class="cpp">C++</td>
    <td class="html">HTML</td>
    <td class="css">CSS</td>

    <td rowspan="5" class="break">
        B<br><br>
        R<br><br>
        E<br><br>
        A<br><br>
        K
    </td>

    <td colspan="2" class="java">Java</td>
    <td colspan="2" class="cpp">C++</td>
</tr>

<tr>
    <td class="days">Tue</td>
    <td rowspan="3" class="hindi">Hindi</td>
    <td colspan="2" class="webdev">WebDev</td>
    <td class="cpp">C++</td>
    <td class="html">HTML</td>
    <td class="css">CSS</td>
    <td rowspan="2" class="os">OS</td>
</tr>

<tr>
    <td class="days">Wed</td>
    <td colspan="2" class="cpp">C++</td>
    <td colspan="3" class="django">Django</td>
</tr>

<tr>
    <td class="days">Thu</td>
    <td colspan="2" class="java">Java</td>
    <td class="english">English</td>
    <td class="go">Go</td>
    <td colspan="2" class="networks">Networks</td>
</tr>

<tr>
    <td class="days">Fri</td>
    <td colspan="3" class="datascience">Data Science</td>
    <td colspan="2" class="cpp">C++</td>
    <td class="go">Go</td>
    <td class="python">Python</td>
</tr>

</table>
