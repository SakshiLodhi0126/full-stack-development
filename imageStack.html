<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Stack</title>
    <link rel="stylesheet" href="imageStack.css">
</head>
<body>
    <div class="container">
        <div class="view">
            <div class="images">
                <img class="five" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRCkLKSqmC5LgeYtG3CGp7jd_yAViNfYKLiSw&s" alt="Image 5">
                <img class="four" src="https://img.freepik.com/free-photo/mountain-forest-beautiful-night-sky-with-stars_651396-1910.jpg?semt=ais_hybrid&w=740&q=80" alt="Image 4">
                
                <img class="three main-featured" src="https://static.vecteezy.com/system/resources/thumbnails/020/655/112/small/beautiful-sky-and-clouds-during-twilight-time-sunset-photo.jpg" alt="Image 3">
                
                <img class="two" src="https://img.magnific.com/free-photo/beautiful-trees-grass-covered-hill-clouds-sky_181624-10598.jpg?semt=ais_hybrid&w=740&q=80" alt="Image 2">
                <img class="one" src="https://static.vecteezy.com/system/resources/thumbnails/050/391/274/small/sunrise-or-sunset-blue-and-peach-sky-morning-colorful-long-shot-evening-serene-sunset-calm-landscape-nature-sunrise-peaceful-vibrant-blue-sky-breathtaking-beautiful-tranquil-photo.jpg" alt="Image 1">
            </div>
        </div>

        <div class="content">
            <div class="buttons">
                <div class="arrow">▲</div>
                <div class="arrow">▼</div>
            </div>

            <div class="text">
                <h1>Sky is the Limit</h1>
                <h4>REACHING NEW HORIZONS</h4>
            </div>

            <div class="dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot active"></span>
                <span class="dot"></span>
            </div>
        </div>
    </div>
</body>
</html>
