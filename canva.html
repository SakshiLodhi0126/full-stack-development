<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Clone</title>

    <link rel="stylesheet" href="canva.css">

    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
        <nav>
            <div class="left">

                <a href="">File</a>
                <a href="">Resize</a>

                <div class="down">
                    <i class="fa-solid fa-pen"></i>
                    Editing
                    <i class="fa-solid fa-angle-down"></i>
                </div>

                <i class="fa-solid fa-rotate-left icon"></i>
                <i class="fa-solid fa-rotate-right icon"></i>

                <i class="fa-solid fa-cloud-arrow-up icon" ></i>

            </div>

            <div class="center">

                <span class="sample">Sample</span>

                <button class="btn">
                    👑 Start your trial for ₹0
                </button>

                <div class="small-icon profile">
                    <img src="https://i.etsystatic.com/31548528/r/il/ffde13/5804742914/il_fullxfull.5804742914_ap2d.jpg" alt="">
                </div>

                <div class="small">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>

                <div class="small">
                    <i class="fa-regular fa-comment"></i>
                </div>

                <button class="present">
                    Present
                    <i class="fa-solid fa-angle-down"></i>
                </button>

                <button class="share">
                    Share
                </button>

            </div>

        </nav>
        <div class="main_container">
            <!-- Sidebar-->
            <div class="sidebar">
                <div class="item active">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Templates</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-shapes"></i>
                    <span>Elements</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-t"></i>
                    <span>Text</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-camera"></i>
                    <span>Brand</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Uploads</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-pen-ruler"></i>
                    <span>Tools</span>
                </div>
                <div class="item">
                    <i class="fa-regular fa-folder"></i>
                    <span>Projects</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-table-cells-large"></i>
                    <span>Apps</span>
                </div>                                                                                                         
                <div class="item">
                    <i class="fa-regular fa-image"></i>
                    <span>Magic Media</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-music"></i>
                    <span>Audio</span>
                </div>
                <div class="item">
                    <i class="fa-regular fa-circle"></i>
                    <span>Videoforme</span>
                </div>
            </div>
            <!-- left --> 
           <div class="left-panel">
                <div class="search-section">
                    <div class="search-box">
                        <i class="fa-solid fa-plus"></i>
                        <input type="text"
                        placeholder="Describe your ideal design">
                        <i class="fa-solid fa-microphone"></i>
                    </div>
                    <div class="btn-group">
                        <button class="generate-btn">
                            ✨ Generate
                        </button>
                        <button class="search-btn">
                            Search
                        </button>
                    </div>
                </div>
                <div class="recent-head">
                    <h4>Recently used</h4>
                    <span>See all</span>
                </div>
                <div class="recent-grid">
                    <div class="recent-card">
                        <img src="https://www.slidescarnival.com/wp-content/uploads/Cute-Pastel-Portfolio-1.jpg" alt="">
                    </div>
                    <div class="recent-card">
                        <img src="https://template.canva.com/EAG2rIx7Y58/1/0/1600w-K1OZSTJs2dg.jpg" alt="">

                    </div>
                </div>
                
                <h6 class="all-result-title">
                    All results
                </h6>
                <div class="template-grid">
                    <div class="template-card">
                        <img src="https://www.slidescarnival.com/wp-content/uploads/Cute-Pastel-Portfolio-4.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://template.canva.com/EAGkaHvyKPk/1/0/400w-6sghgAxyjXU.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://www.slidescarnival.com/wp-content/uploads/Cute-Pastel-Portfolio-3.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQUQybP3rkKQcLPNhIf-s9nq8wnH5TCLOt86g&s" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRXL1-FWO059fR9oPez8BHS2DXEk__2HhQEew&s" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://template.canva.com/EAFI5LVKax8/2/0/400w-4x9i0_4ZCLA.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://template.canva.com/EAG73U7UHDc/1/0/1600w-rApUsxgMf_0.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://img.magnific.com/free-vector/minimal-florist-job-landing-page-template_23-2150050585.jpg?semt=ais_hybrid&w=740&q=80" alt="">
                    </div>
                     <div class="template-card">
                        <img src="https://template.canva.com/EAG188E0qgE/1/0/1600w-56RPz6ubSHU.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://www.slidescarnival.com/wp-content/uploads/Cute-Pastel-Portfolio-5.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://cdn.creativefabrica.com/2022/11/06/FREE-Canva-Website-Template-Portfolio-Graphics-45131678-2-580x386.png" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://template.canva.com/EAGe4u6NSf0/1/0/1600w-_rWdA-P2Das.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://template.canva.com/EAGgRM_gc54/1/0/1600w-y6LDLlUTGmE.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSn07oFMsFq65h5uSytF6yN5Q8u5Dh-3Tov6w&s" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://template.canva.com/EAE6MgnV1rw/1/0/1600w-QZKRYjfT8Kg.jpg" alt="">
                    </div>
                    <div class="template-card">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQCPkGGhR_gOVU0K76KcF2h8GK7P9lI_1jbIg&s" alt="">
                    </div>
                </div>
            </div>
            <div class="workspace">
"

                <div class="top-toolbar">
                    <span>Edit</span>
                    <div class="red-color"></div>
                    <i class="fa-solid fa-bars"></i>
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                    <i class="fa-solid fa-grip"></i>

                    <span>Effects</span>
                    <span>Animate</span>
                    <span>Position</span>

                    <i class="fa-solid fa-paint-roller"></i>
                </div>

                <div class="canvas">

                    <div class="circle"></div>

                    <div class="square"></div>

                    <div class="triangle"></div>

                    <div class="pentagon"></div>

                    <div class="plus-shape"></div>

                    <div class="parallelogram"></div>

                    <div class="arrow-up"></div>

                    <div class="heart-box">

                        <div class="heart-tools">
                            <i class="fa-solid fa-rotate-right"></i>
                            <i class="fa-solid fa-lock"></i>
                            <i class="fa-regular fa-copy"></i>
                            <i class="fa-regular fa-trash-can"></i>
                            <i class="fa-solid fa-ellipsis"></i>
                        </div>

                        <div class="heart"></div>

                        <div class="handle h1"></div>
                        <div class="handle h2"></div>
                        <div class="handle h3"></div>

                        <div class="handle h4"></div>
                        <div class="handle h5"></div>

                        <div class="handle h6"></div>
                        <div class="handle h7"></div>
                        <div class="handle h8"></div>

                    </div>

                    <div class="rotate-handle">
                        <i class="fa-solid fa-rotate"></i>                              </div>

                </div>
                    <div class="bottom-panel">

                        <div class="page-thumbnail">
                            <img src="shapes.png" alt="">
                        </div>

                        <div class="add-page">
                            <i class="fa-solid fa-plus"></i>
                            <i class="fa-solid fa-angle-down"></i>
                        </div>

                        <div class="bottom-controls">

                            <div class="left-controls">
                                <span><i class="fa-regular fa-note-sticky"></i> Notes</span>
                                <span><i class="fa-regular fa-clock"></i> Timer</span>
                            </div>

                            <div class="right-controls">

                                <div class="zoom-slider">
                                    <div class="slider-line"></div>
                                    <div class="slider-dot"></div>
                                </div>

                                <span class="zoom-text">53%</span>

                                <button class="pages-btn">
                                   <button class="page">
                                    <i class="fa-regular fa-window-restore"></i>
                                    Pages
                                   </button> 

                                </button>

                                <span>1 / 1</span>

                                <i class="fa-solid fa-grip"></i>
                                <i class="fa-solid fa-expand"></i>
                                

                            </div>

                        </div>

                    </div>
            </div>
            <div >
            </div>
        </div>
</body>
</html>
