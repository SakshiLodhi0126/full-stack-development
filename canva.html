<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Clone</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="canva.css">
</head>

<body>

    <nav class="navbar">

        <div class="left">

            <a href="#">File</a>

            <a href="#">Resize</a>

            <a href="#">✏️ Editing ▼</a>

            <a href="#">↶ ↷</a>

            <a href="#">☁️<sup>New</sup></a>

        </div>

        <div class="center">
            <span>Sample</span>
        </div>

        <div class="right">

            <button class="trial">
                👑 Start your trial for ₹0
            </button>

            <button class="profile">

                <img src="https://cdn.vectorstock.com/i/500p/08/85/cute-black-haired-girl-avatar-vector-61860885.jpg"
                     alt="Profile">

            </button>

            <button class="icon">📊</button>

            <button class="icon">💬</button>

            <button class="present">Present ▼</button>

            <button class="share">Share</button>

        </div>

    </nav>

    <div class="container">

        <div class="main-section">

            <aside class="sidebar">

                <div class="menu-item">

                    <div>📄</div>

                    <span>Templates</span>

                </div>


                <div class="menu-item">

                    <div>🔲</div>

                    <span>Elements</span>

                </div>


                <div class="menu-item">

                    <div>T</div>

                    <span>Text</span>

                </div>


                <div class="menu-item">

                    <div>👑</div>

                    <span>Brand</span>

                </div>


                <div class="menu-item">

                    <div>⬆</div>

                    <span>Uploads</span>

                </div>


                <div class="menu-item">

                    <div>🛠</div>

                    <span>Tools</span>

                </div>


                <div class="menu-item">

                    <div>📁</div>

                    <span>Projects</span>

                </div>

            </aside>

            <div class="workspace d-flex justify-content-center align-items-center">

                <div class="canvas">

    <div class="container py-5">

        <div class="row text-center g-5">
            <div class="col-md-3">
                <div class="shape circle"></div>
            </div>

             <div class="col-md-3">
                <div class="shape square"></div>
            </div>

        
            <div class="col-md-3">
                <div class="triangle"></div>
            </div>

            
            <div class="col-md-3">
                <div class="shape pentagon"></div>
            </div>

            
            <div class="col-md-3">
                <div class="plus"></div>
            </div>

            
            <div class="col-md-3">
                <div class="shape parallelogram"></div>
            </div>

            
            <div class="col-md-3">
                <div class="arrow-up"></div>
            </div>

            
            <div class="col-md-3">
                <div class="heart"></div>
            </div>

        </div>

    </div>

</div>

            </div>


        </div>

    </div>

</body>
</html>
